[profile.default]
src = "src"
out = "out"
libs = ["lib"]
evm_version = "istanbul"
optimizer = true
optimizer_runs = 1000
bytecode_hash = "none"
remappings = [
    "@uniswap/v2-core/contracts=lib/v2-core.git/contracts",
    "@uniswap/v3-core/contracts=src/v3-core",
    "@uniswap/v3-periphery=src/v3-periphery",
    "@uniswap/lib=lib/uniswap-solidity-lib/",
    "@openzeppelin/contracts=lib/openzeppelin-contracts.git/contracts",
    "base64-sol=lib/base64.git",
]

[lint]
ignore = ["src/v3-core/**", "src/v3-periphery", "lib/**"]
# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
